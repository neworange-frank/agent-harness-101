name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The exact same command attendees run locally. Single source of truth
      # for "done": what passes on their machine is what gates the merge.
      - name: Run checks
        run: npm run check
